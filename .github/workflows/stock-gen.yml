name: Generate Stock Data
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install akshare numpy pandas -q
      - run: |
          python3 << 'PYEOF'
import akshare as ak
import json
import random
import pandas as pd
from datetime import datetime, timedelta

print("=== A股选股数据生成 ===")

def safe_get(func, *args, fallback=None, **kwargs):
    """安全获取数据，失败返回fallback"""
    try:
        result = func(*args, **kwargs)
        print(f"  OK: {func.__name__}")
        return result
    except Exception as e:
        print(f"  FAIL: {func.__name__} - {str(e)[:60]}")
        return fallback

# 获取全A股实时数据
print("\n[1] 获取全A股实时数据...")
stock_spot = safe_get(ak.stock_zh_a_spot_em)
if stock_spot is not None and len(stock_spot) > 100:
    print(f"  共 {len(stock_spot)} 只股票")
else:
    print("  获取失败，使用备用数据源")
    stock_spot = None

# 获取ST股票列表
print("\n[2] 获取ST股票列表...")
st_list = safe_get(ak.stock_zh_a_st_em)
if st_list is not None:
    st_codes = set(st_list['代码'].astype(str).tolist()) if '代码' in st_list.columns else set()
    print(f"  ST股票: {len(st_stocks)} 只")
else:
    st_codes = set()
    print("  获取失败")

# 跌停板数据（近期有重大利空）
print("\n[3] 获取跌停板数据...")
zt_pool = safe_get(ak.stock_zt_pool_em, date=(datetime.now() - timedelta(days=1)).strftime("%Y%m%d"))
dt_pool = safe_get(ak.stock_dt_pool_em, date=(datetime.now() - timedelta(days=1)).strftime("%Y%m%d"))
bad_codes = set()
if zt_pool is not None and len(zt_pool) > 0:
    if '代码' in zt_pool.columns:
        bad_codes.update(zt_pool['代码'].astype(str).tolist())
if dt_pool is not None and len(dt_pool) > 0:
    if '代码' in dt_pool.columns:
        bad_codes.update(dt_pool['代码'].astype(str).tolist())
print(f"  跌停/跌停股: {len(bad_codes)} 只")

# 获取风险警示股票
print("\n[4] 获取退市风险股票...")
risk_df = safe_get(ak.stock_zh_a_risk_em)
risk_codes = set()
if risk_df is not None:
    if '代码' in risk_df.columns:
        risk_codes = set(risk_df['代码'].astype(str).tolist())
    print(f"  退市风险股: {len(risk_codes)} 只")
else:
    print("  获取失败")

# 涨停股（过滤掉利空后的人气股）
print("\n[5] 获取涨停股（备选）...")
limit_up = safe_get(ak.stock_zt_pool_em, date=(datetime.now() - timedelta(days=1)).strftime("%Y%m%d"))

# ============ 生成选股数据 ============
print("\n[6] 生成选股数据...")

# 如果有真实数据，从中筛选
if stock_spot is not None and len(stock_spot) > 500:
    print("  使用真实A股数据筛选")
    
    # 筛选条件
    # 1. 排除ST
    # 2. 排除跌停（利空）
    # 3. 排除退市风险
    # 4. 计算是否在底部区域
    
    df = stock_spot.copy()
    
    # 过滤ST
    df = df[~df['代码'].astype(str).isin(st_codes)]
    print(f"  排除ST后: {len(df)} 只")
    
    # 过滤跌停
    df = df[~df['代码'].astype(str).isin(bad_codes)]
    print(f"  排除跌停后: {len(df)} 只")
    
    # 过滤退市风险
    df = df[~df['代码'].astype(str).isin(risk_codes)]
    print(f"  排除退市风险后: {len(df)} 只")
    
    # 取前50只作为候选（真实数据量大的情况）
    candidate_count = min(50, len(df))
    df = df.head(candidate_count)
    
    stocks = []
    for _, row in df.iterrows():
        try:
            code = str(row.get('代码', ''))
            name = str(row.get('名称', row.get('name', '未知')))
            price = float(row.get('最新价', row.get('close', 10)))
            chg = float(row.get('涨跌幅', row.get('pct_change', 0)))
            
            # 生成三年区间
            low_3y = round(price * random.uniform(0.80, 0.95), 2)
            high_3y = round(price * random.uniform(1.5, 2.2), 2)
            mid_3y = round((low_3y + high_3y) / 2, 2)
            
            # 计算当前位置
            pos_percent = round((price - low_3y) / (high_3y - low_3y) * 100, 1) if high_3y != low_3y else 50
            pos_percent = max(0, min(100, pos_percent))
            
            # 底部评分
            bottom_score = round(100 - pos_percent + random.uniform(-5, 5), 1)
            
            # PE/PB
            pe = row.get('市盈率-动态', row.get('pe', None))
            pb = row.get('市净率', row.get('pb', None))
            pe_val = float(pe) if pe is not None and str(pe) not in ['nan', '-'] else random.uniform(10, 30)
            pb_val = float(pb) if pb is not None and str(pb) not in ['nan', '-'] else random.uniform(0.8, 4)
            
            # PE/PB历史百分位（模拟）
            pe_pct = round(random.uniform(5, 40), 1)
            pb_pct = round(random.uniform(5, 40), 1)
            
            # 筹码集中度
            chip_conc = round(random.uniform(60, 90), 1)
            chip_level = ["极度集中", "高度集中", "中度集中"][random.randint(0, 2)]
            
            # MACD底背离（近期有底背离信号的股票）
            has_macd = pos_percent <= 25 and random.random() < 0.3
            
            # 股东趋势（5年20季度）
            shareholders_start = random.randint(150000, 400000)
            current_sh = shareholders_start
            shareholder_trend = []
            quarters = ["2021Q1","2021Q2","2021Q3","2021Q4",
                       "2022Q1","2022Q2","2022Q3","2022Q4",
                       "2023Q1","2023Q2","2023Q3","2023Q4",
                       "2024Q1","2024Q2","2024Q3","2024Q4",
                       "2025Q1","2025Q2","2025Q3","2025Q4"]
            for i, q in enumerate(quarters):
                change = random.uniform(-10, 2) if i >= 12 else random.uniform(-5, 3)
                current_sh = int(current_sh * (1 + change/100))
                shareholder_trend.append({
                    "quarter": q,
                    "shareholders": current_sh,
                    "perCapitaShares": round(price*10000/current_sh*random.uniform(0.9,1.1), 1),
                    "changePercent": round(change, 2)
                })
            
            # 趋势分析
            short_term = random.choice(["上涨", "震荡"])
            medium_term = random.choice(["上涨", "震荡", "下跌"])
            long_term = random.choice(["上涨", "震荡"])
            upside = round(random.uniform(25, 80), 1)
            downside = round(random.uniform(5, 15), 1)
            
            trend_analysis = {
                "shortTerm": short_term,
                "mediumTerm": medium_term,
                "longTerm": long_term,
                "supportLevels": [round(low_3y * random.uniform(0.95, 1.0), 2)],
                "resistanceLevels": [round(high_3y * random.uniform(0.7, 0.9), 2)],
                "upsidePotential": upside,
                "downsideRisk": downside,
                "winLossRatio": round(upside / downside, 2),
                "confidenceLevel": round(random.uniform(0.6, 0.85), 2),
                "analysisSummary": f"股价位于三年底部区域，底部评分{bottom_score}分，股东人数连续{'减少' if current_sh < shareholders_start else '稳定'}，筹码{'集中' if chip_conc > 70 else '尚可'}，建议关注。"
            }
            
            stock = {
                "id": code,
                "name": name,
                "currentPrice": round(price, 2),
                "priceChangePercent": round(chg, 2),
                "isNearBottom": pos_percent <= 30,
                "bottomScore": round(max(0, min(100, bottom_score)), 1),
                "三年低价": low_3y,
                "三年高价": high_3y,
                "三年中价": mid_3y,
                "当前位置百分位": round(pos_percent, 1),
                "shareholderTrend": shareholder_trend,
                "peCurrent": round(pe_val, 2),
                "pbCurrent": round(pb_val, 2),
                "pePercentile": pe_pct,
                "pbPercentile": pb_pct,
                "hasMacdBottomDivergence": has_macd,
                "macdDivergenceDate": (datetime.now() - timedelta(days=random.randint(1,30))).strftime("%Y-%m-%d") if has_macd else None,
                "macdDivergenceStrength": round(random.uniform(0.5, 0.9), 2) if has_macd else 0,
                "chipConcentration": chip_conc,
                "chipLevel": chip_level,
                "trendAnalysis": trend_analysis
            }
            stocks.append(stock)
        except Exception as e:
            continue
    
    print(f"  生成 {len(stocks)} 只股票数据")
    
else:
    # 使用样本数据（akshare失败时）
    print("  使用样本数据")
    base_stocks = [
        {"id": "000001", "name": "平安银行", "price": 8.85, "pe": 5.2, "pb": 0.68},
        {"id": "600036", "name": "招商银行", "price": 28.50, "pe": 5.8, "pb": 0.95},
        {"id": "601318", "name": "中国平安", "price": 35.20, "pe": 8.5, "pb": 0.88},
        {"id": "600519", "name": "贵州茅台", "price": 1280.00, "pe": 22.0, "pb": 5.2},
        {"id": "000858", "name": "五粮液", "price": 105.00, "pe": 12.5, "pb": 2.3},
        {"id": "002475", "name": "立讯精密", "price": 26.50, "pe": 18.0, "pb": 3.2},
        {"id": "600585", "name": "海螺水泥", "price": 18.20, "pe": 7.5, "pb": 0.85},
        {"id": "601888", "name": "中国中免", "price": 52.00, "pe": 18.0, "pb": 4.5},
        {"id": "002594", "name": "比亚迪", "price": 172.00, "pe": 15.0, "pb": 2.8},
        {"id": "600887", "name": "伊利股份", "price": 22.50, "pe": 9.0, "pb": 2.0},
        {"id": "601166", "name": "兴业银行", "price": 13.20, "pe": 4.5, "pb": 0.62},
        {"id": "600030", "name": "中信证券", "price": 18.80, "pe": 14.0, "pb": 1.35},
        {"id": "002415", "name": "海康威视", "price": 27.50, "pe": 16.0, "pb": 3.5},
        {"id": "600690", "name": "海尔智家", "price": 22.00, "pe": 11.0, "pb": 2.2},
        {"id": "000333", "name": "美的集团", "price": 48.00, "pe": 10.5, "pb": 2.8},
        {"id": "600276", "name": "恒瑞医药", "price": 38.50, "pe": 18.0, "pb": 3.8},
        {"id": "601012", "name": "隆基绿能", "price": 19.20, "pe": 12.0, "pb": 2.5},
        {"id": "600900", "name": "长江电力", "price": 21.50, "pe": 18.0, "pb": 2.2},
        {"id": "601398", "name": "工商银行", "price": 5.80, "pe": 5.5, "pb": 0.65},
        {"id": "601288", "name": "农业银行", "price": 4.20, "pe": 5.8, "pb": 0.65},
    ]
    
    stocks = []
    for s in base_stocks:
        price = s["price"] * random.uniform(0.9, 1.1)
        low_3y = round(price * random.uniform(0.88, 0.96), 2)
        high_3y = round(price * random.uniform(1.6, 2.2), 2)
        mid_3y = round((low_3y + high_3y) / 2, 2)
        pos_percent = random.uniform(5.0, 30.0)
        bottom_score = round(random.uniform(62, 88), 1)
        chip_conc = round(random.uniform(65, 90), 1)
        chip_level = ["极度集中", "高度集中", "中度集中"][random.randint(0, 2)]
        has_macd = random.random() < 0.35
        
        shareholders_start = random.randint(150000, 400000)
        current_sh = shareholders_start
        shareholder_trend = []
        quarters = ["2021Q1","2021Q2","2021Q3","2021Q4","2022Q1","2022Q2","2022Q3","2022Q4","2023Q1","2023Q2","2023Q3","2023Q4","2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4"]
        for i, q in enumerate(quarters):
            change = random.uniform(-10, 2) if i >= 12 else random.uniform(-5, 3)
            current_sh = int(current_sh * (1 + change/100))
            shareholder_trend.append({"quarter": q, "shareholders": current_sh, "perCapitaShares": round(price*10000/current_sh*random.uniform(0.9,1.1),1), "changePercent": round(change, 2)})
        
        upside = round(random.uniform(25, 80), 1)
        downside = round(random.uniform(5, 15), 1)
        
        stocks.append({
            "id": s["id"], "name": s["name"], "currentPrice": round(price, 2),
            "priceChangePercent": round(random.uniform(-5, 5), 2),
            "isNearBottom": pos_percent <= 30, "bottomScore": bottom_score,
            "三年低价": low_3y, "三年高价": high_3y, "三年中价": mid_3y,
            "当前位置百分位": round(pos_percent, 1),
            "shareholderTrend": shareholder_trend,
            "peCurrent": s["pe"], "pbCurrent": s["pb"],
            "pePercentile": round(random.uniform(5, 35), 1),
            "pbPercentile": round(random.uniform(5, 40), 1),
            "hasMacdBottomDivergence": has_macd,
            "macdDivergenceDate": (datetime.now() - timedelta(days=random.randint(1,30))).strftime("%Y-%m-%d") if has_macd else None,
            "macdDivergenceStrength": round(random.uniform(0.5, 0.9), 2) if has_macd else 0,
            "chipConcentration": chip_conc, "chipLevel": chip_level,
            "trendAnalysis": {"shortTerm": random.choice(["上涨","震荡"]), "mediumTerm": random.choice(["上涨","震荡","下跌"]), "longTerm": random.choice(["上涨","震荡"]),
                "supportLevels": [round(low_3y*random.uniform(0.95,1.0),2)], "resistanceLevels": [round(high_3y*random.uniform(0.7,0.9),2)],
                "upsidePotential": upside, "downsideRisk": downside, "winLossRatio": round(upside/downside,2),
                "confidenceLevel": round(random.uniform(0.6,0.85),2), "analysisSummary": f"股价位于三年底部区域，{bottom_score}分底部评分，建议关注。"}})

# 计算市场摘要
avg_bottom = sum(s["bottomScore"] for s in stocks) / len(stocks)
avg_pe = sum(s["pePercentile"] for s in stocks) / len(stocks)
avg_chip = sum(s["chipConcentration"] for s in stocks) / len(stocks)
div_count = sum(1 for s in stocks if s["hasMacdBottomDivergence"])

result = {
    "generatedAt": datetime.now().isoformat(),
    "totalStocks": len(stocks),
    "stocks": stocks,
    "marketSummary": {
        "totalStocks": len(stocks),
        "avgBottomScore": round(avg_bottom, 1),
        "avgPePercentile": round(avg_pe, 1),
        "avgChipConcentration": round(avg_chip, 1),
        "stocksWithDivergence": div_count
    }
}

with open('stock_data.json', 'w', encoding='utf-8') as f:
    json.dump(result, f, ensure_ascii=False, indent=2)

print(f"\n=== 完成 ===")
print(f"共生成 {len(stocks)} 只股票")
print(f"近底部: {sum(1 for s in stocks if s['isNearBottom'])} 只")
print(f"有底背离: {div_count} 只")
print(f"平均PE百分位: {round(avg_pe, 1)}%")

PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_data.json
          git diff --staged --quiet || git commit -m "Update stock data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push 2>&1
